<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: system-ui, -apple-system, sans-serif;
    background: #0A1628;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
  }
  .bg-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.05;
    background-image: repeating-linear-gradient(
      45deg, #10B981 0px, #10B981 1px, transparent 1px, transparent 20px
    );
  }
  .logo {
    font-size: 28px;
    font-weight: 800;
    color: #10B981;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }
  .title {
    font-size: 52px;
    font-weight: 800;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 20px;
    max-width: 900px;
  }
  .subtitle {
    font-size: 26px;
    color: rgba(255,255,255,0.7);
    text-align: center;
    max-width: 800px;
  }
  .url {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-size: 20px;
    color: #10B981;
    font-weight: 600;
  }
  .badge {
    position: absolute;
    top: 40px;
    right: 60px;
    background: #10B981;
    color: #0A1628;
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="logo">🏦 PréstamoRápido.pro</div>
  <h1 class="title">Préstamo Rápido<br>Online en España</h1>
  <p class="subtitle">Compara y solicita préstamos rápidos en minutos</p>
  <span class="badge">Gratis · 2026</span>
  <span class="url">prestamorapido.pro</span>
</body>
</html>
